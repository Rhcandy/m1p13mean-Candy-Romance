<div class="auth-main">
  <div class="auth-wrapper v3">
    <div class="auth-form">
      <div class="card my-5">
        <div class="card-body">
          <form (ngSubmit)="onSubmit($event)" novalidate>
            <a href="#" (click)="$event.preventDefault()" class="d-flex justify-content-center">
              <img src="assets/images/logo3.png" alt="logo" class="auth-logo-img" />
              <span class="brand-text brand-script">Royal Center</span>
            </a>

            <div class="row">
              <div class="d-flex justify-content-center">
                <div class="auth-header">
                  <h2 class="text-secondary mt-5"><b>Forgot your password?</b></h2>
                  <p class="fs-4 mt-2">Enter your email to receive a reset code</p>
                </div>
              </div>
            </div>

            <div class="form-floating mb-3">
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                [(ngModel)]="model.email"
                [class.is-invalid]="submitted && !model.email"
                placeholder="Email Address"
              />
              <label for="email">Email address</label>
              <div *ngIf="submitted && !model.email" class="invalid-feedback">
                Email is required
              </div>
            </div>

            <div *ngIf="error" class="alert alert-danger" role="alert">
              {{ error }}
            </div>

            <div *ngIf="success" class="alert alert-success" role="alert">
              {{ success }}
            </div>

            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-secondary" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                Send reset code
              </button>
            </div>

            <hr />
            <h5 class="d-flex justify-content-center">
              <a [routerLink]="['/login']">Back to login</a>
            </h5>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
