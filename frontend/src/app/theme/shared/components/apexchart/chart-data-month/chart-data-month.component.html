<div class="row">
  <div class="col">
    <div class="avatar avatar-lg">
      <i class="text-white ti ti-credit-card"></i>
    </div>
  </div>
  <div class="col-auto">
    <div class="d-flex align-items-center gap-2 chart-income">
      <div
        class="btn btn-sm text-white"
        [ngClass]="this.btnActive === 'month' ? 'btn-primary' : ''"
        (click)="toggleActive('month')"
        tabindex="0"
        (keydown)="handleKeyDown($event, 'month')"
      >
        Month
      </div>
      <div
        class="btn btn-sm text-white"
        [ngClass]="this.btnActive === 'year' ? 'btn-primary' : ''"
        (click)="toggleActive('year')"
        tabindex="0"
        (keydown)="handleKeyDown($event, 'year')"
      >
        Year
      </div>

    </div>
  </div>
  <label for="yearSelect">Année:</label>
<select id="yearSelect" (change)="loadRevenueByMonth($event)">
  <option *ngFor="let y of [2024,2025,2026]" [value]="y">{{ y }}</option>
</select>
</div>

<div class="row">
  <div class="col-6">
    <span class="text-white d-block f-34 f-w-500 my-2">
      ${{ amount }}
      <i class="ti ti-circle-arrow-up-right opacity-50"></i>
    </span>
    <p class="mb-0 opacity-50">C/w Last Year</p>
  </div>
  <div class="col-6">
    <div id="chart text-dark">
<apx-chart
  #chart
  [series]="chartOptions.series"
  [chart]="chartOptions.chart"
  [xaxis]="chartOptions.xaxis"
  [stroke]="chartOptions.stroke"
  [colors]="chartOptions.colors"
  [tooltip]="chartOptions.tooltip">
</apx-chart>
    </div>
  </div>
</div>
