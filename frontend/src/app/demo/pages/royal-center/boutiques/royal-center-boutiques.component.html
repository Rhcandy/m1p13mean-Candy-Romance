<div class="container-fluid royal-section">
  <div class="row mb-4">
    <div class="col-12">
      <div class="page-title-box d-sm-flex align-items-center justify-content-between">
        <h4 class="mb-sm-0">Gestion des boutiques - Royal Center</h4>
      </div>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <div class="row g-2 align-items-end">
        <div class="col-md-6">
          <label class="form-label">Recherche nom</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="filters.search"
            (keyup.enter)="applyFilters()"
            placeholder="Nom boutique"
          />
        </div>
        <div class="col-md-4">
          <label class="form-label">Statut</label>
          <select class="form-select" [(ngModel)]="filters.status">
            <option value="all">Toutes</option>
            <option value="pending">En attente</option>
            <option value="active">Actives</option>
            <option value="inactive">Inactives</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-warning w-100" (click)="applyFilters()">
            <i class="ti ti-filter"></i> Filtrer
          </button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <div *ngIf="!loading" class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-centered mb-0">
          <thead>
            <tr>
              <th>Boutique</th>
              <th>Locataire</th>
              <th>Statut</th>
              <th>Box</th>
              <th>Creee le</th>
              <th class="text-center">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let boutique of boutiques">
              <td class="fw-semibold">{{ boutique.nom }}</td>
              <td>{{ getOwnerLabel(boutique) }}</td>
              <td>
                <span class="badge" [ngClass]="getStatusClass(boutique)">{{ getStatusLabel(boutique) }}</span>
              </td>
              <td>{{ getBoxCount(boutique) }}</td>
              <td>{{ boutique.createdAt | date: 'dd/MM/yyyy' }}</td>
              <td class="text-center">
                <button
                  class="btn btn-sm btn-outline-warning me-1"
                  (click)="confirmBoutiqueCreation(boutique)"
                  [disabled]="!boutique.isPendingFirstActivation || isBusy(boutique)"
                  title="Confirmer creation"
                >
                  <i class="ti ti-check"></i>
                </button>
                <button
                  class="btn btn-sm btn-outline-danger"
                  (click)="deleteBoutique(boutique)"
                  [disabled]="isBusy(boutique)"
                  title="Supprimer"
                >
                  <i class="ti ti-trash"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="boutiques.length === 0">
              <td colspan="6" class="text-center text-muted py-4">Aucune boutique.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
