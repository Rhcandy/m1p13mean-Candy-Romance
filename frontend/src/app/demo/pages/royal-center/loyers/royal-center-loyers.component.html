<div class="container-fluid royal-section">

  <div class="row mb-4">

    <div class="col-12">

      <div class="d-flex justify-content-between align-items-center">

        <h4>Loyers - Royal Center</h4>

        <!-- Bouton pour afficher le formulaire -->
      <button class="btn btn-primary" (click)="openCreateModal()">
        + Ajouter un loyer
      </button>

      <!-- Formulaire d'ajout -->
      <div *ngIf="creating" class="mt-3 p-3 border rounded bg-light">

        <div class="mb-2">
          <label>Boutique</label>
          <select class="form-control" [(ngModel)]="selectedBoutiqueCreate">
            <option value="">Choisir boutique</option>
            <option *ngFor="let b of boutiques" [value]="b._id">{{ b.nom }}</option>
          </select>
        </div>

        <div class="mb-2">
          <label>Période</label>
          <input type="month" class="form-control" [(ngModel)]="selectedPeriodeCreate">
        </div>

        <button class="btn btn-success me-2" (click)="createLoyer()">Créer</button>
        <button class="btn btn-secondary" (click)="creating=false">Annuler</button>

      </div>

      </div>

    </div>

  </div>


  <!-- LOADING -->
  <div *ngIf="loading" class="text-center">

    <div class="spinner-border text-primary"></div>

  </div>


  <!-- TABLE -->
  <div *ngIf="!loading">

    <div *ngIf="loyers.length === 0">

      Aucun loyer

    </div>

    <div class="row mb-3">

  <!-- FILTRE PERIODE -->
  <div class="col-md-3">

    <label>Période</label>

    <input
      type="month"
      class="form-control"
      [(ngModel)]="selectedPeriode">

  </div>


  <!-- FILTRE BOUTIQUE -->
  <div class="col-md-3">

    <label>Boutique</label>

    <select
      class="form-control"
      [(ngModel)]="selectedBoutique">

      <option value="">Toutes</option>

      <option
        *ngFor="let b of boutiques"
        [value]="b._id">

        {{ b.nom }}

      </option>

    </select>

  </div>


  <!-- BOUTON -->
  <div class="col-md-3 d-flex align-items-end">

    <button
      class="btn btn-primary"
      (click)="loadLoyers()">

      Filtrer

    </button>

  </div>

</div>
    <table
      *ngIf="loyers.length > 0"
      class="table table-bordered">

      <thead>

        <tr>
          <th>Période</th>
          <th>Boutique</th>

          <th>Lignes</th>

          <th>Payé</th>

          <th>Reste</th>

          <th>Date</th>

          <th>Actions</th>

        </tr>

      </thead>

      <tbody>

        <tr *ngFor="let loyer of loyers">
          <td>
            {{ formatPeriode(loyer.periode) }}
          </td>
          <td>
            {{ getBoutiqueName(loyer) }}
          </td>

          <td>
            {{ loyer.lignes }}
          </td>

          <td>
            {{ getTotalMontantPaye(loyer) | number }}
          </td>

          <td>
            {{ getTotalRestePaye(loyer) | number }}
          </td>

          <td>
            {{ loyer.updatedAt | date:'dd/MM/yyyy HH:mm' }}
          </td>

          <td>

            <button
              class="btn btn-sm btn-success me-1"
              (click)="pay(loyer)">

              Pay

            </button>


            <button
              class="btn btn-sm btn-primary me-1"
              (click)="openEditModal(loyer)">

              Edit

            </button>


            <button
              class="btn btn-sm btn-danger"
              (click)="deleteLoyer(loyer)">

              Delete

            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
