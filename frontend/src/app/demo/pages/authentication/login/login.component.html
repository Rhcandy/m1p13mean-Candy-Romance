<div class="auth-main">
  <div class="auth-wrapper v3">
    <div class="auth-form">
      <div class="card my-5">
        <div class="card-body">
          <form (ngSubmit)="onSubmit($event)" novalidate>
  <a href="/landing" (click)="$event.preventDefault()" class="d-flex justify-content-center">
    <img src="assets/images/logo3.png" alt="logo" class="auth-logo-img" />
     <span class="brand-text brand-script">Royal Center</span>
  </a>

  <div class="row">
    <div class="d-flex justify-content-center">
      <div class="auth-header">
        <h2 class="text-secondary mt-5"><b>Bonjour, bon retour</b></h2>
        <p class="fs-4 mt-2">Entrez vos identifiants pour continuer</p>
      </div>
    </div>
  </div>

  <div class="form-floating mb-3">
    <input
      type="email"
      class="form-control"
      id="floatingInput"
      name="email"
      [(ngModel)]="model.email"
      [class.is-invalid]="submitted && !model.email"
      placeholder="Adresse e-mail"
    />
    <label for="floatingInput">Adresse e-mail / Nom d'utilisateur</label>
    <div *ngIf="submitted && !model.email" class="invalid-feedback">
      L'adresse e-mail est obligatoire
    </div>
  </div>

  <div class="mb-3">
    <label for="password" class="form-label">Mot de passe</label>
    <div class="input-group">
      <input
        [type]="showPassword ? 'text' : 'password'"
        id="password"
        class="form-control"
        name="password"
        [(ngModel)]="model.password"
        [class.is-invalid]="submitted && !model.password"
        placeholder="Mot de passe"
      />
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="togglePasswordVisibility()"
        [attr.aria-label]="showPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
      >
        <i class="ti" [ngClass]="showPassword ? 'ti-eye-off' : 'ti-eye'"></i>
      </button>
    </div>
    <div *ngIf="submitted && !model.password" class="invalid-feedback d-block">
      Le mot de passe est obligatoire
    </div>
  </div>

  <div class="d-flex mt-1 justify-content-between">
    <div class="form-check">
      <input class="form-check-input input-primary" type="checkbox" id="customCheckc1" />
      <label class="form-check-label text-muted" for="customCheckc1">Se souvenir de moi</label>
    </div>
    <h5 class="text-secondary">
      <a [routerLink]="['/forgot-password']">Mot de passe oublie ?</a>
    </h5>
  </div>

  <div *ngIf="error" class="alert alert-danger" role="alert">
    {{ error }}
  </div>

  <div class="d-grid mt-4">
    <button type="submit" class="btn btn-secondary" [disabled]="loading">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
      Se connecter
    </button>
  </div>

  <div class="auth-divider mt-4 mb-3" aria-hidden="true">
    <span>ou</span>
  </div>

  <div class="quick-login-actions mb-4">
    <button
      type="button"
      class="btn quick-login-btn quick-login-admin"
      [disabled]="loading"
      (click)="quickLogin('admin')"
    >
      <span class="quick-login-title">Se connecter en admin</span>
    </button>

    <button
      type="button"
      class="btn quick-login-btn quick-login-boutique"
      [disabled]="loading"
      (click)="quickLogin('boutique')"
    >
      <span class="quick-login-title">Se connecter en boutique</span>
    </button>
  </div>

  <hr />
  <h5 class="d-flex justify-content-center">
    <a [routerLink]="['/register']">Vous n'avez pas de compte ?</a>
  </h5>
</form>

        </div>
      </div>
    </div>
  </div>
</div>
