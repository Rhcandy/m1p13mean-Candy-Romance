<div class="auth-main">
  <div class="auth-wrapper v3">
    <div class="auth-form">
      <div class="card my-5">
        <div class="card-body">
          <form (ngSubmit)="onSubmit($event)" novalidate>
  <a href="/landing" (click)="$event.preventDefault()" class="d-flex justify-content-center">
    <img src="assets/images/logo3.png" alt="logo" class="auth-logo-img" />
     <span class="brand-text brand-script">Royal Center</span>
  </a>

  <div class="row">
    <div class="d-flex justify-content-center">
      <div class="auth-header">
        <h2 class="text-secondary mt-5"><b>Hi, Welcome Back</b></h2>
        <p class="fs-4 mt-2">Enter your credentials to continue</p>
      </div>
    </div>
  </div>

  <div class="form-floating mb-3">
    <input
      type="email"
      class="form-control"
      id="floatingInput"
      name="email"
      [(ngModel)]="model.email"
      [class.is-invalid]="submitted && !model.email"
      placeholder="Email Address"
    />
    <label for="floatingInput">Email address / Username</label>
    <div *ngIf="submitted && !model.email" class="invalid-feedback">
      Email is required
    </div>
  </div>

  <div class="mb-3">
    <label for="password" class="form-label">Password</label>
    <div class="input-group">
      <input
        [type]="showPassword ? 'text' : 'password'"
        id="password"
        class="form-control"
        name="password"
        [(ngModel)]="model.password"
        [class.is-invalid]="submitted && !model.password"
        placeholder="Password"
      />
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="togglePasswordVisibility()"
        [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
      >
        <i class="ti" [ngClass]="showPassword ? 'ti-eye-off' : 'ti-eye'"></i>
      </button>
    </div>
    <div *ngIf="submitted && !model.password" class="invalid-feedback d-block">
      Password is required
    </div>
  </div>

  <div class="d-flex mt-1 justify-content-between">
    <div class="form-check">
      <input class="form-check-input input-primary" type="checkbox" id="customCheckc1" />
      <label class="form-check-label text-muted" for="customCheckc1">Remember me</label>
    </div>
    <h5 class="text-secondary">
      <a [routerLink]="['/forgot-password']">Forgot Password?</a>
    </h5>
  </div>

  <div *ngIf="error" class="alert alert-danger" role="alert">
    {{ error }}
  </div>

  <div class="d-grid mt-4">
    <button type="submit" class="btn btn-secondary" [disabled]="loading">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
      Sign In
    </button>
  </div>

  <hr />
  <h5 class="d-flex justify-content-center">
    <a [routerLink]="['/register']">Don't have an account?</a>
  </h5>
</form>

        </div>
      </div>
    </div>
  </div>
</div>
