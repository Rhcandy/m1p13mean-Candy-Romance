<div class="auth-main">
  <div class="auth-wrapper v3">
    <div class="auth-form">
      <div class="card mt-5">
        <div class="card-body">
          <form (ngSubmit)="onSubmit($event)" novalidate>

            <!-- Logo -->
            <a href="javascript:" class="d-flex justify-content-center mt-3">
              <img src="assets/images/logo-dark.svg" alt="logo" />
            </a>

            <!-- Header -->
            <div class="d-flex justify-content-center">
              <div class="auth-header text-center">
                <h2 class="text-secondary mt-5"><b>Sign up</b></h2>
                <p class="fs-4 mt-2">Enter your credentials to continue</p>
              </div>
            </div>

            <!-- ROLE SELECTION -->
            <div class="mb-4">
              <label class="form-label fw-bold">
                Choisissez votre type de compte
              </label>

              <div class="row">
                <div class="col-md-6 mb-2">
                  <button
                    type="button"
                    class="btn w-100"
                    [ngClass]="selectedRole === 'user' ? 'btn-primary' : 'btn-outline-primary'"
                    (click)="selectRole('user')"
                  >
                    <i class="bi bi-person me-2"></i>
                    Client
                  </button>
                  <small class="text-muted d-block mt-1">
                    Particulier cherchant des produits et services
                  </small>
                </div>

                <div class="col-md-6 mb-2">
                  <button
                    type="button"
                    class="btn w-100"
                    [ngClass]="selectedRole === 'admin_boutique' ? 'btn-primary' : 'btn-outline-primary'"
                    (click)="selectRole('admin_boutique')"
                  >
                    <i class="bi bi-shop me-2"></i>
                    Boutique
                  </button>
                  <small class="text-muted d-block mt-1">
                    Commerçant vendant des produits ou services
                  </small>
                </div>
              </div>
            </div>

            <!-- NAME -->
            <div class="form-floating mb-3">
              <input
                type="text"
                class="form-control"
                id="name"
                name="name"
                [(ngModel)]="model.name"
                [class.is-invalid]="submitted && !model.name"
                placeholder="Nom complet"
              />
              <label for="name">Nom complet</label>
              <div class="invalid-feedback">
                Nom requis
              </div>
            </div>

            <!-- EMAIL -->
            <div class="form-floating mb-3">
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                [(ngModel)]="model.email"
                [class.is-invalid]="submitted && !model.email"
                placeholder="Email"
              />
              <label for="email">Email</label>
              <div class="invalid-feedback">
                Email requis
              </div>
            </div>

            <!-- PASSWORD -->
            <div class="form-floating mb-3">
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                [(ngModel)]="model.password"
                [class.is-invalid]="submitted && !model.password"
                placeholder="Mot de passe"
              />
              <label for="password">Mot de passe</label>
              <div class="invalid-feedback">
                Mot de passe requis
              </div>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="form-floating mb-3">
              <input
                type="password"
                class="form-control"
                id="confirmPassword"
                name="confirmPassword"
                [(ngModel)]="model.confirmPassword"
                [class.is-invalid]="submitted && model.password !== model.confirmPassword"
                placeholder="Confirmer mot de passe"
              />
              <label for="confirmPassword">Confirmer le mot de passe</label>
              <div class="invalid-feedback">
                Les mots de passe ne correspondent pas
              </div>
            </div>

            <!-- AVATAR -->
            <div class="mb-3">
              <label class="form-label">Photo de profil (optionnelle)</label>
              <input
                type="file"
                class="form-control"
                accept="image/*"
                (change)="onAvatarSelected($event)"
              />
            </div>

            <!-- ERROR -->
            <div *ngIf="error" class="alert alert-danger">
              {{ error }}
            </div>

            <!-- SUBMIT -->
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-secondary" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                Sign Up
              </button>
            </div>

          </form>

          <hr />

          <h5 class="d-flex justify-content-center">
            <a [routerLink]="['/login']">Already have an account?</a>
          </h5>

        </div>
      </div>
    </div>
  </div>
</div>
