<div class="product-container">
  <div class="product-wrapper">
    <!-- Card avec bordure arrondie épaisse -->
    <div class="product-card">
      
      <!-- Section Image avec background coloré et prix flottant -->
      <div class="image-section">
        
        <!-- Prix badge en haut à droite -->
        <div class="price-badge">
          <span class="price-text">
            {{ formatPrice(product.prix[0].prixUnitaire) }}
          </span>
        </div>

        <!-- Image du produit -->
        <div class="product-image-container">
          <img 
            [src]="product.photo"
            [alt]="product.nom"
            class="product-image"
          />
        </div>

        <!-- Badge livraison en bas -->
        <div class="delivery-badge">
          Free Delivery until {{ product.deliveryDate }}
        </div>
      </div>

      <!-- Section Nom et Order Now -->
      <div class="info-section">
        <div class="header-row">
          <h3 class="product-name">
            {{ product.nom }}
          </h3>
          <button class="order-button" (click)="onOrderNow()">
            Order Now
            <svg 
              xmlns="http://www.w3.org/2000/svg" 
              width="16" 
              height="16" 
              viewBox="0 0 24 24" 
              fill="none" 
              stroke="currentColor" 
              stroke-width="2" 
              stroke-linecap="round" 
              stroke-linejoin="round"
              class="arrow-icon"
            >
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </div>

        <!-- Tags/Chips -->
        <div class="tags-container">
          <!-- Tag catégorie -->
          <span class="tag tag-category">
            {{ product.categorieId.nom }}
          </span>
          
          <!-- Tags des attributs du variant -->
          <span 
            *ngFor="let tag of variantTags"
            class="tag tag-variant"
          >
            {{ tag.label }}
          </span>
          
          <!-- Tag stock -->
          <span 
            *ngIf="hasStock()" 
            class="tag tag-stock"
          >
            Stock: {{ product.variant[0].qtt }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
