<header class="bg-white shadow-md sticky top-0 z-50">
  <nav class="container mx-auto px-4 py-4">
    <div class="flex justify-between items-center">
      <!-- Logo et nom de l'app -->
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-primary rounded-full flex items-center justify-center">
          <span class="text-white font-bold text-lg">CR</span>
        </div>
        <span class="text-xl font-bold text-primary">{{ appName }}</span>
      </div>

      <!-- Menu desktop -->
      <div class="hidden md:flex items-center space-x-6">
        <a href="/" class="text-primary hover:text-accent transition-colors">Accueil</a>
        <a href="/shops" class="text-primary hover:text-accent transition-colors">Boutiques</a>
        <a href="/products" class="text-primary hover:text-accent transition-colors">Produits</a>
        <a href="/cart" class="text-primary hover:text-accent transition-colors">Panier</a>
        <a href="/login" class="btn-primary">Connexion</a>
      </div>

      <!-- Menu mobile -->
      <button class="md:hidden" (click)="toggleMenu()">
        <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>

    <!-- Menu mobile déroulant -->
    <div class="md:hidden mt-4 space-y-2" [class.hidden]="!isMenuOpen">
      <a href="/" class="block py-2 text-primary hover:text-accent transition-colors">Accueil</a>
      <a href="/shops" class="block py-2 text-primary hover:text-accent transition-colors">Boutiques</a>
      <a href="/products" class="block py-2 text-primary hover:text-accent transition-colors">Produits</a>
      <a href="/cart" class="block py-2 text-primary hover:text-accent transition-colors">Panier</a>
      <a href="/login" class="btn-primary inline-block">Connexion</a>
    </div>
  </nav>
</header>
