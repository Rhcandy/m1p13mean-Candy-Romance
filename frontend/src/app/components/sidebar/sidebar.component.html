<aside class="bg-white shadow-lg h-screen sticky top-0 transition-all duration-300" 
       [class.w-64]="!isCollapsed" 
       [class.w-20]="isCollapsed">
  <div class="p-4">
    <!-- Toggle button -->
    <button class="mb-6 p-2 rounded-lg hover:bg-gray-100 transition-colors w-full text-left"
            (click)="toggleSidebar()">
      <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>

    <!-- Logo -->
    <div class="mb-8 flex items-center space-x-3">
      <div class="w-10 h-10 bg-primary rounded-full flex items-center justify-center flex-shrink-0">
        <span class="text-white font-bold text-lg">CR</span>
      </div>
      <span class="text-xl font-bold text-primary transition-opacity duration-300"
            [class.opacity-0]="isCollapsed"
            [class.hidden]="isCollapsed">m1p13mean</span>
    </div>

    <!-- Navigation -->
    <nav class="space-y-2">
      <a href="/dashboard" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-gray-100 transition-colors group">
        <svg class="w-6 h-6 text-primary group-hover:text-accent flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
        </svg>
        <span class="transition-opacity duration-300" 
              [class.opacity-0]="isCollapsed"
              [class.hidden]="isCollapsed">Tableau de bord</span>
      </a>

      <a href="/products" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-gray-100 transition-colors group">
        <svg class="w-6 h-6 text-primary group-hover:text-accent flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
        </svg>
        <span class="transition-opacity duration-300" 
              [class.opacity-0]="isCollapsed"
              [class.hidden]="isCollapsed">Produits</span>
      </a>

      <a href="/orders" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-gray-100 transition-colors group">
        <svg class="w-6 h-6 text-primary group-hover:text-accent flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
        </svg>
        <span class="transition-opacity duration-300" 
              [class.opacity-0]="isCollapsed"
              [class.hidden]="isCollapsed">Commandes</span>
      </a>

      <a href="/users" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-gray-100 transition-colors group">
        <svg class="w-6 h-6 text-primary group-hover:text-accent flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
        </svg>
        <span class="transition-opacity duration-300" 
              [class.opacity-0]="isCollapsed"
              [class.hidden]="isCollapsed">Utilisateurs</span>
      </a>

      <a href="/shops" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-gray-100 transition-colors group">
        <svg class="w-6 h-6 text-primary group-hover:text-accent flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
        </svg>
        <span class="transition-opacity duration-300" 
              [class.opacity-0]="isCollapsed"
              [class.hidden]="isCollapsed">Boutiques</span>
      </a>

      <a href="/settings" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-gray-100 transition-colors group">
        <svg class="w-6 h-6 text-primary group-hover:text-accent flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
        </svg>
        <span class="transition-opacity duration-300" 
              [class.opacity-0]="isCollapsed"
              [class.hidden]="isCollapsed">Paramètres</span>
      </a>
    </nav>
  </div>
</aside>
